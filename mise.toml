[tools]
bun = "latest"
lefthook = "latest"
rust = "latest"

[tasks.build]
description = "Build the Rust formatter"
run = "cargo build --release"

[tasks.checks]
description = "Run all checks (formatting, linting)"
depends = ["format:check", "lint:check", "test"]

[tasks.fix]
description = "Fix Rust code"
depends = ["lint", "format"]

[tasks.format]
description = "Format Rust code"
run = "cargo fmt"

[tasks."format:check"]
description = "Check Rust code formatting"
run = "cargo fmt --check"

[tasks."lint:check"]
description = "Lint Rust code with Clippy"
run = "cargo clippy -- --deny warnings"

[tasks.lint]
description = "Fix linting issues with Clippy"
run = "cargo clippy --fix --allow-dirty --allow-staged"

[tasks.test]
description = "Run all tests"
run = "cargo test"
